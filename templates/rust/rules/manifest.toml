# Downstream install manifest for the jig rust lint rules.
#
# jig ships rule *sources* (the .md files beside this manifest), not pre-baked
# kino blobs — a kino is content-addressed and must be created by `kinora store`
# in the consuming project's ledger. The installer `install-rules.sh` reads this
# manifest and, for each entry, stores the source into the target's `rules` root
# with the metadata below, skipping rules already present:
#
#   ./install-rules.sh <project-dir>
#
# It stages the kinos and prints the `kinora commit` (main) + `git` steps. `/jig
# init rust` and `/jig sync rust` invoke it when the kinora jig is active. To add
# a rule: drop a `<slug>.md` here and add its entry below (the installer
# drift-checks that the two stay in sync).

[[rule]]
name = "jig::rust::no-unwrap-in-lib"
file = "no-unwrap-in-lib.md"
ns = "jig::rust"
rung = 1
target_rung = 1
mechanism = "clippy"
category = "idiom"

[[rule]]
name = "jig::rust::no-todo-committed"
file = "no-todo-committed.md"
ns = "jig::rust"
rung = 1
target_rung = 1
mechanism = "clippy"
category = "idiom"

[[rule]]
name = "jig::rust::prefer-file-modules"
file = "prefer-file-modules.md"
ns = "jig::rust"
rung = 1
target_rung = 1
mechanism = "arch-test"
category = "structure"
